# Lightweight LoRA fine-tuning configuration.
# This config is intentionally small for educational runs.

project_name: domain-lora-finetuning-pipeline
seed: 42

model:
  # A small instruction model suitable for demos. You can replace this with another causal LM.
  base_model_name: HuggingFaceTB/SmolLM2-135M-Instruct
  torch_dtype: auto
  device_map: auto
  trust_remote_code: false
  max_seq_length: 512

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - v_proj

training:
  train_file: data/splits/train.jsonl
  validation_file: data/splits/validation.jsonl
  output_dir: outputs/lora_adapter
  logging_dir: outputs/logs
  num_train_epochs: 1
  max_steps: 30
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  warmup_steps: 2
  weight_decay: 0.0
  logging_steps: 1
  save_steps: 10
  eval_steps: 10
  save_total_limit: 2
  fp16: false
  bf16: false
  gradient_checkpointing: false

split:
  validation_size: 0.25
  shuffle: true

inference:
  max_new_tokens: 220
  temperature: 0.1
  top_p: 0.9
  do_sample: false
